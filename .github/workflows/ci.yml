# SPEC v8.7 §25.2 — pipeline única de verdade. Merge em main exige este workflow verde.
name: ci

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spec-present:
    name: Spec documents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce SPEC v8.7 files
        run: |
          test -f SPEC.md || (echo "::error::Falta SPEC.md" && exit 1)
          test -f SPEC_FRONTEND.md || (echo "::error::Falta SPEC_FRONTEND.md" && exit 1)
          test -f AGENTS.md || (echo "::error::Falta AGENTS.md" && exit 1)

  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    needs: spec-present
    if: ${{ hashFiles('backend/**/*.sln') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Require test project (SPEC §23 + §25)
        shell: bash
        run: |
          set -e
          if ! find backend -name '*Tests*.csproj' 2>/dev/null | grep -q .; then
            echo "::error::Obrigatório existir pelo menos um projeto *Tests*.csproj em backend/ (SPEC.md §25)"
            exit 1
          fi
      - name: dotnet restore build test + SPEC §23.3 cobertura
        shell: bash
        run: |
          set -e
          SLN=$(find backend -name '*.sln' | head -1)
          dotnet restore "$SLN"
          dotnet build "$SLN" -c Release --no-restore
          dotnet test "$SLN" -c Release --no-build \
            --settings backend/tests/Parking.Tests/coverlet.spec.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./backend-coverage-out \
            --verbosity normal
          COV=$(find backend-coverage-out -name 'coverage.cobertura.xml' -print -quit)
          test -n "$COV" || (echo '::error::Arquivo coverage.cobertura.xml não gerado' && exit 1)
          python3 backend/scripts/check_spec_coverage.py "$COV"

  frontend-web:
    name: Frontend Web (Vue)
    runs-on: ubuntu-latest
    needs: spec-present
    if: ${{ hashFiles('frontend-web/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - name: npm ci lint build test (SPEC_FRONTEND §13.2 / §13.4)
        working-directory: frontend-web
        run: |
          npm ci
          npm run lint
          npm run build
          npm run test

  frontend-e2e:
    name: Frontend E2E (Playwright)
    runs-on: ubuntu-latest
    needs: spec-present
    if: ${{ hashFiles('frontend-web/package.json') != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Start Postgres (SPEC §19)
        run: docker compose up -d --wait
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      # Ambiente local espelhado em scripts/e2e-ci-env.ps1 (manter em sync).
      - name: Build and start API (E2E_SEED)
        env:
          ASPNETCORE_URLS: http://127.0.0.1:8080
          DATABASE_URL_IDENTITY: Host=127.0.0.1;Port=5432;Database=parking_identity;Username=parking;Password=parking_dev
          DATABASE_URL_AUDIT: Host=127.0.0.1;Port=5432;Database=parking_audit;Username=parking;Password=parking_dev
          TENANT_DATABASE_URL_TEMPLATE: Host=127.0.0.1;Port=5432;Database=parking_{uuid};Username=parking;Password=parking_dev
          JWT_SECRET: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          PIX_WEBHOOK_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
          PIX_MODE: Stub
          E2E_SEED: "1"
          CORS_ORIGINS: http://127.0.0.1:5173
        run: |
          dotnet build backend/src/Parking.Api/Parking.Api.csproj -c Release
          dotnet run --project backend/src/Parking.Api/Parking.Api.csproj --no-build -c Release --no-launch-profile > /tmp/parking-api.log 2>&1 &
          echo $! > /tmp/parking-api.pid
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8080/health && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8080/health
      - name: Playwright install + E2E
        working-directory: frontend-web
        env:
          # Playwright: ver scripts/e2e-ci-env.ps1 → chave Playwright
          CI: "true"
          E2E_API_ORIGIN: http://127.0.0.1:8080
          E2E_API_BASE: http://127.0.0.1:8080/api/v1
          PIX_WEBHOOK_SECRET: bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm run test:e2e
      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/parking-api.pid ]; then kill $(cat /tmp/parking-api.pid) 2>/dev/null || true; fi

  android:
    name: Android unit (Gradle)
    runs-on: ubuntu-latest
    needs: spec-present
    if: ${{ (hashFiles('android/**/build.gradle.kts') != '' || hashFiles('android/**/build.gradle') != '') && hashFiles('android/gradlew') != '' }}
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: assembleDebug + test (SPEC_FRONTEND §13.5)
        run: chmod +x gradlew && ./gradlew assembleDebug test --no-daemon

  android-instrumented:
    name: Android instrumented (SPEC_FRONTEND §13.3–13.4)
    runs-on: ubuntu-latest
    needs: spec-present
    if: ${{ (hashFiles('android/**/build.gradle.kts') != '' || hashFiles('android/**/build.gradle') != '') && hashFiles('android/gradlew') != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          emulator-boot-timeout: 600
          script: |
            cd android
            chmod +x gradlew
            ./gradlew connectedDebugAndroidTest --no-daemon
