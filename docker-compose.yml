# SPEC v8.4 §19 — Postgres para desenvolvimento local.
services:
  postgres:
    image: postgres:16-alpine
    container_name: parking-postgres
    environment:
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking_dev
    ports:
      - "5432:5432"
    volumes:
      - parking_pgdata:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  parking_pgdata:
